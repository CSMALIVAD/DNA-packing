<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated DNA Packing Hierarchy</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#ffffff;
    font-family:Arial, sans-serif;
    overflow-x:auto;
}

h1{
    text-align:center;
    margin-bottom:40px;
    animation:fadeIn 2s ease;
}

svg{
    width:100%;
    height:auto;
}

.label{
    font-size:18px;
    font-weight:bold;
}

.small{
    font-size:14px;
}

.scale{
    font-size:15px;
    font-weight:bold;
    fill:#004080;
}

/* ANIMATIONS */

.fade{
    opacity:0;
    animation:fadeIn 2s forwards;
}

.delay1{ animation-delay:1s; }
.delay2{ animation-delay:2s; }
.delay3{ animation-delay:3s; }
.delay4{ animation-delay:4s; }
.delay5{ animation-delay:5s; }
.delay6{ animation-delay:6s; }

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* DNA movement */

.dna-wave{
    stroke-dasharray:10;
    animation:dnaMove 3s linear infinite;
}

@keyframes dnaMove{
    from{
        stroke-dashoffset:0;
    }
    to{
        stroke-dashoffset:100;
    }
}

/* Nucleosome rotation */

.rotate{
    transform-origin:center;
    animation:spin 6s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

/* Chromatin pulse */

.pulse{
    animation:pulseAnim 2s infinite;
}

@keyframes pulseAnim{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.03);
    }
    100%{
        transform:scale(1);
    }
}

/* Arrow bounce */

.arrow{
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(8px);
    }
}

</style>
</head>

<body>

<h1>DNA Packing from Double Helix to Metaphase Chromosome</h1>

<svg viewBox="0 0 1000 2600">

<!-- 1 DNA Double Helix -->

<g class="fade delay1">

<text x="50" y="80" class="label">
1) DNA Double Helix
</text>

<path class="dna-wave"
d="M50 120 Q100 80 150 120 T250 120 T350 120 T450 120"
stroke="#0066cc"
fill="none"
stroke-width="4"/>

<path class="dna-wave"
d="M50 140 Q100 100 150 140 T250 140 T350 140 T450 140"
stroke="#ff0066"
fill="none"
stroke-width="4"/>

<text x="500" y="130" class="scale">
2 nm
</text>

</g>

<!-- Arrow -->

<g class="arrow fade delay1">

<line x1="250" y1="170" x2="250" y2="220"
stroke="black"
stroke-width="3"/>

<polygon points="242,220 258,220 250,235"
fill="black"/>

</g>

<!-- 2 Nucleosome -->

<g class="fade delay2">

<text x="50" y="280" class="label">
2) Nucleosome
</text>

<g class="rotate">

<circle cx="220" cy="360" r="50"
stroke="#800080"
fill="none"
stroke-width="5"/>

</g>

<line x1="100" y1="360" x2="340" y2="360"
stroke="#333"
stroke-width="4"/>

<text x="370" y="355" class="small">
Histone octamer + DNA wrap
</text>

<text x="620" y="365" class="scale">
10 nm fiber
</text>

</g>

<!-- Arrow -->

<g class="arrow fade delay2">

<line x1="250" y1="420" x2="250" y2="470"
stroke="black"
stroke-width="3"/>

<polygon points="242,470 258,470 250,485"
fill="black"/>

</g>

<!-- 3 30nm Fiber -->

<g class="fade delay3">

<text x="50" y="540" class="label">
3) 30 nm Chromatin Fiber
</text>

<path class="pulse"
d="M100 620
C150 560 200 680 250 620
C300 560 350 680 400 620
C450 560 500 680 550 620"
stroke="#ff6600"
fill="none"
stroke-width="8"/>

<text x="620" y="630" class="scale">
30 nm
</text>

</g>

<!-- Arrow -->

<g class="arrow fade delay3">

<line x1="250" y1="690" x2="250" y2="740"
stroke="black"
stroke-width="3"/>

<polygon points="242,740 258,740 250,755"
fill="black"/>

</g>

<!-- 4 Looped Domains -->

<g class="fade delay4">

<text x="50" y="820" class="label">
4) Looped Chromatin Domains
</text>

<path class="pulse"
d="M150 900
Q200 820 250 900
Q300 980 350 900
Q400 820 450 900
Q500 980 550 900"
stroke="#009966"
fill="none"
stroke-width="4"/>

<line x1="120" y1="950" x2="580" y2="950"
stroke="black"
stroke-dasharray="8,6"
stroke-width="2"/>

<text x="620" y="900" class="small">
Scaffold attachment
</text>

<text x="700" y="930" class="scale">
300 nm
</text>

</g>

<!-- Arrow -->

<g class="arrow fade delay4">

<line x1="250" y1="1010" x2="250" y2="1060"
stroke="black"
stroke-width="3"/>

<polygon points="242,1060 258,1060 250,1075"
fill="black"/>

</g>

<!-- 5 Condensed Chromatid -->

<g class="fade delay5">

<text x="50" y="1140" class="label">
5) Condensed Chromatid
</text>

<rect class="pulse"
x="220"
y="1200"
width="90"
height="300"
rx="50"
ry="50"
stroke="#cc0000"
fill="rgba(255,0,0,0.08)"
stroke-width="5"/>

<text x="350" y="1350" class="scale">
700 nm
</text>

<text x="220" y="1520" class="small">
Telomere
</text>

</g>

<!-- Arrow -->

<g class="arrow fade delay5">

<line x1="260" y1="1560" x2="260" y2="1610"
stroke="black"
stroke-width="3"/>

<polygon points="252,1610 268,1610 260,1625"
fill="black"/>

</g>

<!-- 6 Metaphase Chromosome -->

<g class="fade delay6">

<text x="50" y="1700" class="label">
6) Metaphase Chromosome
</text>

<rect class="pulse"
x="180"
y="1760"
width="90"
height="360"
rx="50"
ry="50"
stroke="#000099"
fill="rgba(0,0,255,0.08)"
stroke-width="5"/>

<rect class="pulse"
x="350"
y="1760"
width="90"
height="360"
rx="50"
ry="50"
stroke="#000099"
fill="rgba(0,0,255,0.08)"
stroke-width="5"/>

<rect
x="255"
y="1910"
width="110"
height="70"
rx="20"
stroke="#000"
fill="#cccccc"
stroke-width="3"/>

<text x="255" y="1895" class="small">
Centromere
</text>

<text x="480" y="1950" class="scale">
1400 nm
</text>

<text x="180" y="2140" class="small">
Telomere
</text>

<text x="350" y="2140" class="small">
Telomere
</text>

</g>

</svg>

</body>
</html>
