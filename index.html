<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hierarchical DNA Packaging Animation</title>

<style>

body{
    margin:0;
    background:#f4f8fc;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
    color:#111;
}

h1{
    text-align:center;
    padding:20px;
    font-size:34px;
    color:#102a43;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
}

svg{
    width:100%;
    max-width:1400px;
    height:auto;
}

/* TEXT */

.label{
    font-size:22px;
    font-weight:bold;
    fill:#102a43;
}

.annotation{
    font-size:15px;
    fill:#444;
}

.scale{
    font-size:18px;
    font-weight:bold;
    fill:#0056b3;
}

/* DNA STRANDS */

.dnaA{
    stroke:#1565c0;
    stroke-width:5;
    fill:none;
    stroke-linecap:round;
    stroke-dasharray:14;
    animation:dnaFlow 5s linear infinite;
}

.dnaB{
    stroke:#8e24aa;
    stroke-width:5;
    fill:none;
    stroke-linecap:round;
    stroke-dasharray:14;
    animation:dnaFlowReverse 5s linear infinite;
}

.basepair{
    stroke:#6b7280;
    stroke-width:2;
    animation:bpPulse 2s infinite;
}

@keyframes dnaFlow{
    from{stroke-dashoffset:0;}
    to{stroke-dashoffset:-140;}
}

@keyframes dnaFlowReverse{
    from{stroke-dashoffset:140;}
    to{stroke-dashoffset:0;}
}

@keyframes bpPulse{
    0%{opacity:0.4;}
    50%{opacity:1;}
    100%{opacity:0.4;}
}

/* HISTONES */

.histone{
    fill:url(#histoneGrad);
    stroke:#4a148c;
    stroke-width:2;
    animation:histoneRotate 12s linear infinite;
    transform-origin:center;
}

@keyframes histoneRotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* WRAPPED DNA */

.wrapDNA{
    fill:none;
    stroke:#00acc1;
    stroke-width:4;
    stroke-dasharray:10;
    animation:wrapMove 4s linear infinite;
}

@keyframes wrapMove{
    from{stroke-dashoffset:0;}
    to{stroke-dashoffset:-80;}
}

/* 30nm FIBER */

.fiber{
    fill:none;
    stroke:url(#fiberGrad);
    stroke-width:14;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:22;
    animation:fiberFlow 6s linear infinite;
}

@keyframes fiberFlow{
    from{stroke-dashoffset:0;}
    to{stroke-dashoffset:-220;}
}

/* LOOPS */

.loop{
    fill:none;
    stroke:#2e7d32;
    stroke-width:6;
    animation:loopFlex 5s ease-in-out infinite;
}

@keyframes loopFlex{
    0%{
        transform:scaleY(1);
    }
    50%{
        transform:scaleY(1.08);
    }
    100%{
        transform:scaleY(1);
    }
}

/* SCAFFOLD */

.scaffold{
    stroke:#1f2937;
    stroke-width:5;
    stroke-dasharray:10;
}

/* CHROMATID */

.chromatid{
    fill:url(#chromatidGrad);
    stroke:#1e3a8a;
    stroke-width:4;
    animation:condense 6s ease-in-out infinite;
}

@keyframes condense{
    0%{
        transform:scaleX(1);
    }
    50%{
        transform:scaleX(1.04);
    }
    100%{
        transform:scaleX(1);
    }
}

/* CHROMOSOME */

.chromosome{
    fill:url(#chromosomeGrad);
    stroke:#1a237e;
    stroke-width:5;
    animation:metaphase 4s ease-in-out infinite;
}

@keyframes metaphase{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.015);
    }
    100%{
        transform:scale(1);
    }
}

/* ARROWS */

.arrow{
    stroke:#111827;
    stroke-width:3;
    animation:arrowDown 1.8s infinite;
}

@keyframes arrowDown{
    0%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(10px);
    }
    100%{
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<h1>Continuous Hierarchical Packaging of Eukaryotic DNA</h1>

<div class="container">

<svg viewBox="0 0 1400 3600">

<defs>

<linearGradient id="histoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#ce93d8"/>
<stop offset="100%" stop-color="#6a1b9a"/>
</linearGradient>

<linearGradient id="fiberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#42a5f5"/>
<stop offset="100%" stop-color="#7e57c2"/>
</linearGradient>

<linearGradient id="chromatidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#90caf9"/>
<stop offset="100%" stop-color="#1e3a8a"/>
</linearGradient>

<linearGradient id="chromosomeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#c5cae9"/>
<stop offset="100%" stop-color="#283593"/>
</linearGradient>

</defs>

<!-- ===================== DNA DOUBLE HELIX ===================== -->

<text x="60" y="80" class="label">
1) DNA Double Helix
</text>

<path class="dnaA"
d="M100 180
Q170 90 240 180
T380 180
T520 180
T660 180"/>

<path class="dnaB"
d="M100 230
Q170 140 240 230
T380 230
T520 230
T660 230"/>

<!-- BASE PAIRS -->

<line x1="130" y1="165" x2="130" y2="215" class="basepair"/>
<line x1="200" y1="125" x2="200" y2="175" class="basepair"/>
<line x1="270" y1="165" x2="270" y2="215" class="basepair"/>
<line x1="340" y1="125" x2="340" y2="175" class="basepair"/>
<line x1="410" y1="165" x2="410" y2="215" class="basepair"/>
<line x1="480" y1="125" x2="480" y2="175" class="basepair"/>
<line x1="550" y1="165" x2="550" y2="215" class="basepair"/>

<text x="760" y="205" class="scale">
2 nm
</text>

<!-- ARROW -->

<line x1="350" y1="300" x2="350" y2="380" class="arrow"/>
<polygon points="338,380 362,380 350,400" fill="#111"/>

<!-- ===================== NUCLEOSOME ===================== -->

<text x="60" y="520" class="label">
2) Nucleosome Formation
</text>

<circle cx="350" cy="700" r="70" class="histone"/>

<path class="wrapDNA"
d="
M240 700
C260 560 440 560 460 700
C440 840 260 840 240 700
C260 600 420 600 440 700
C420 800 280 800 260 700
"/>

<line x1="150" y1="700" x2="240" y2="700"
stroke="#00acc1"
stroke-width="4"/>

<line x1="460" y1="700" x2="560" y2="700"
stroke="#00acc1"
stroke-width="4"/>

<text x="620" y="690" class="annotation">
DNA wrapped ~1.7 turns around histone octamer
</text>

<text x="1080" y="705" class="scale">
10 nm fiber
</text>

<!-- ARROW -->

<line x1="350" y1="860" x2="350" y2="940" class="arrow"/>
<polygon points="338,940 362,940 350,960" fill="#111"/>

<!-- ===================== 30nm FIBER ===================== -->

<text x="60" y="1080" class="label">
3) 30 nm Chromatin Fiber
</text>

<path class="fiber"
d="
M120 1240
C200 1100 280 1380 360 1240
C440 1100 520 1380 600 1240
C680 1100 760 1380 840 1240
"/>

<text x="980" y="1250" class="scale">
30 nm
</text>

<!-- ARROW -->

<line x1="430" y1="1420" x2="430" y2="1500" class="arrow"/>
<polygon points="418,1500 442,1500 430,1520" fill="#111"/>

<!-- ===================== LOOP DOMAINS ===================== -->

<text x="60" y="1660" class="label">
4) Looped Chromatin Domains
</text>

<line x1="140" y1="1880" x2="920" y2="1880" class="scaffold"/>

<path class="loop"
d="M220 1880 Q300 1700 380 1880"/>

<path class="loop"
d="M420 1880 Q500 1650 580 1880"/>

<path class="loop"
d="M620 1880 Q700 1700 780 1880"/>

<text x="980" y="1860" class="annotation">
Scaffold attachment regions
</text>

<text x="1160" y="1885" class="scale">
300 nm
</text>

<!-- ARROW -->

<line x1="430" y1="2000" x2="430" y2="2080" class="arrow"/>
<polygon points="418,2080 442,2080 430,2100" fill="#111"/>

<!-- ===================== CONDENSED CHROMATID ===================== -->

<text x="60" y="2240" class="label">
5) Condensed Chromatid
</text>

<rect
x="320"
y="2360"
width="170"
height="540"
rx="80"
ry="80"
class="chromatid"/>

<!-- INTERNAL TEXTURE -->

<path
d="M350 2420 Q405 2480 460 2420
T460 2520
T460 2620
T460 2720
T460 2820"
stroke="rgba(255,255,255,0.4)"
stroke-width="3"
fill="none"/>

<text x="620" y="2620" class="scale">
700 nm
</text>

<!-- ARROW -->

<line x1="430" y1="2940" x2="430" y2="3020" class="arrow"/>
<polygon points="418,3020 442,3020 430,3040" fill="#111"/>

<!-- ===================== METAPHASE CHROMOSOME ===================== -->

<text x="60" y="3200" class="label">
6) Metaphase Chromosome
</text>

<rect
x="220"
y="3320"
width="180"
height="650"
rx="90"
ry="90"
class="chromosome"/>

<rect
x="520"
y="3320"
width="180"
height="650"
rx="90"
ry="90"
class="chromosome"/>

<!-- CENTROMERE -->

<rect
x="380"
y="3570"
width="160"
height="120"
rx="30"
fill="#5c6bc0"
stroke="#1a237e"
stroke-width="5"/>

<text x="760" y="3650" class="annotation">
Two sister chromatids joined by centromere
</text>

<text x="1150" y="3650" class="scale">
1400 nm
</text>

</svg>

</div>

</body>
</html>
